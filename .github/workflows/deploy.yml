name: Deploy BoBo Clan Website
 
on:
  push:
    branches:
      - main
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Inject token into app.js
        run: |
          sed -i "s|__BOBO_TOKEN__|${{ secrets.BOBO_GH_TOKEN }}|g" app.js
 
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.yml'
 
